{% extends "base.html" %}

{% block title %}
{{ product.name }}
{% endblock %}

{% block content %}

<h1>
    {{ product.name }}
</h1>

<p>
    Catégorie :

        {{ product.category.name }}

</p>

<p>
    {{ product.description }}
</p>

<a

    class="btn btn-secondary">

    Retour

</a>

{% endblock %}
